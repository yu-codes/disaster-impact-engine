# 規則分類方法 — CWA 路徑分類 + 類比相似度
name: "rule_based_classification"
description: "Rule-based CWA track classification with analog similarity ranking"

method: "rule_based"

parameters:
  k: 5
  impact_radius_km: 500.0
  core_radius_km: 200.0
  context_radius_km: 400.0
  no_impact_km: 500.0

  # Similarity weighting for find_similar
  weight_path: 0.4       # Normalized feature distance weight
  weight_category: 0.5   # Category match weight
  weight_intensity: 0.1  # Intensity difference weight

evaluation:
  metrics: ["category_accuracy"]
  leave_one_out: true
  categories: ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
