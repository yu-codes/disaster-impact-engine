{% extends "base.html" %}
{% block title %}資料分析 — 颱風類比預測系統{% endblock %}
{% block content %}
<h1 class="page-title">資料分析</h1>
<p class="page-subtitle">探索歷史侵臺颱風的統計分析與視覺化圖表</p>

{% if images %}
<div class="grid grid-2">
    {% for img in images %}
    <div class="card img-container">
        <img src="{{ img.url }}" alt="{{ img.name }}" onclick="showModal(this.src)" loading="lazy">
        <div class="img-caption">{{ img.name }}</div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="card" style="text-align:center;padding:4rem 2rem;color:var(--text-secondary);">
    <div style="font-size:3rem;margin-bottom:1rem;">📊</div>
    <p>尚無分析圖表</p>
    <p style="font-size:0.85rem;margin-top:0.5rem;">執行 <code>python scripts/run_analysis.py</code> 產生分析圖表</p>
</div>
{% endif %}
{% endblock %}
