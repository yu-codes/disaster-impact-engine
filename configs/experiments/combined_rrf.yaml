# 類比相似度方法 — KNN + DTW + Rule-Based with Reciprocal Rank Fusion
name: "combined_rrf"
description: "Combined KNN + DTW + Rule-Based similarity using Reciprocal Rank Fusion"

method: "combined"

parameters:
  alpha: 0.13          # KNN weight
  rule_weight: 0.25    # Rule-based classification weight
  # DTW weight = 1 - alpha - rule_weight = 0.62
  k: 5                 # Number of analog typhoons
  impact_radius_km: 500.0
  pool_size_factor: 10 # pool = k * factor for RRF candidate selection
  rrf_k: 60           # RRF smoothing constant

  # DTW parameters
  dtw_weights: [1.0, 1.0, 1.0, 0.5]  # [r, theta, wind, pressure]
  sakoe_chiba_ratio: 0.3

  # Feature normalization
  feature_scaler: "standard"

evaluation:
  metrics: ["category_accuracy"]
  leave_one_out: true
  categories: ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
