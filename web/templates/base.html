<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}災害類比預測系統{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="brand">⚡ Disaster Impact Engine</a>
            <div class="nav-links">
                <a href="/" {% if request.path == '/' %}class="active"{% endif %}>首頁</a>
                <a href="/analysis" {% if request.path == '/analysis' %}class="active"{% endif %}>資料分析</a>
                <a href="/methods" {% if request.path == '/methods' %}class="active"{% endif %}>方法說明</a>
                <a href="/predictions" {% if '/predictions' in request.path %}class="active"{% endif %}>預測結果</a>
                <a href="/predict" {% if request.path == '/predict' %}class="active"{% endif %}>即時預測</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Image modal -->
    <div class="modal-overlay" id="imgModal" onclick="this.classList.remove('active')">
        <img id="modalImg" src="" alt="">
    </div>
    <script>
        function showModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imgModal').classList.add('active');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
